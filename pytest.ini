[pytest]
pythonpath = .
testpaths = tests
markers =
    integration: exercises live LLM (OpenAI API key when LLM_PROVIDER=openai, or Ollama when LLM_PROVIDER=ollama; may be flaky)
# Quieter runs: deprecation noise from Pydantic settings / SQLAlchemy / stdlib still counts as "warnings"
# unless filtered here (optional — remove if you want to see every deprecation during tests).
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
