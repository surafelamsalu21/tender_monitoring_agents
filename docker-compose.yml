# Run the API in Linux so Playwright/crawl4ai behave the same on Windows, Mac, and CI.
#
# Usage (from repo root):
#   docker compose build
#   docker compose up
#
# Copy .env.example to .env and fill keys first. SQLite is stored in the named volume
# `tender_sqlite` (not the host file next to the repo) unless you override DATABASE_URL.

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Named volume path inside the container (persists across rebuilds)
      DATABASE_URL: sqlite:////app/data/tender_monitoring.db
      # .env often has OLLAMA_BASE_URL=http://localhost:11434 — inside the container
      # "localhost" is the container itself, so Ollama on the host is unreachable.
      # This override reaches the machine running Docker (Ollama: `ollama serve` on host).
      # For Ollama on another host, set OLLAMA_BASE_URL in .env and remove this line
      # or replace with your URL via a compose profile / separate override file.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      # Linux Docker Engine: makes host.docker.internal resolve to the host gateway
      - "host.docker.internal:host-gateway"
    volumes:
      - tender_sqlite:/app/data

volumes:
  tender_sqlite:
